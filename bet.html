<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fantasy11 — Play Fantasy Cricket</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════ ROOT ════════════════════════ */
:root {
  --bg: #060b12;
  --s1: #0a1220;
  --s2: #0f1d30;
  --s3: #152844;
  --card: #0d1828;
  --border: #1a3050;
  --accent: #00d4aa;
  --accent2: #00b891;
  --gold: #f5c842;
  --gold2: #e6b82a;
  --red: #ff4d6d;
  --blue: #4d9eff;
  --purple: #a855f7;
  --green: #22c55e;
  --text: #e8f4fd;
  --muted: #4a7090;
  --muted2: #7aa8c8;
  --wk-color: #f97316;
  --bat-color: #22c55e;
  --ar-color: #a855f7;
  --bwl-color: #3b82f6;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Poppins',sans-serif; min-height:100vh;
  overflow-x:hidden; font-size:14px;
}
body::before {
  content:''; position:fixed; inset:0;
  background:
    radial-gradient(ellipse 800px 500px at 20% -10%, rgba(0,212,170,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 600px 400px at 80% 80%, rgba(245,200,66,0.04) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}

/* ════════════════════════ SCREENS ════════════════════════ */
.screen { display:none; min-height:100vh; position:relative; z-index:1; }
.screen.active { display:block; animation:fadeSlide 0.3s ease; }
@keyframes fadeSlide { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ════════════════════════ SCROLLBAR ════════════════════════ */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* ════════════════════════ AUTH SCREEN ════════════════════════ */
#authScreen {
  background: linear-gradient(135deg, #060b12 0%, #0a1220 50%, #060b12 100%);
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; padding:20px;
}
.auth-container { width:100%; max-width:400px; }
.auth-logo { text-align:center; margin-bottom:40px; }
.auth-logo .logo-icon { width:70px; height:70px; background:linear-gradient(135deg,var(--accent),var(--gold)); border-radius:20px; display:inline-flex; align-items:center; justify-content:center; font-size:36px; margin-bottom:12px; box-shadow:0 0 40px rgba(0,212,170,0.3); }
.auth-logo h1 { font-family:'Rajdhani',sans-serif; font-size:36px; font-weight:700; letter-spacing:2px; }
.auth-logo h1 span { color:var(--accent); }
.auth-logo p { color:var(--muted2); font-size:13px; }
.auth-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:32px; }
.auth-tabs { display:flex; background:var(--s1); border-radius:12px; padding:4px; margin-bottom:28px; }
.auth-tab { flex:1; padding:10px; text-align:center; border-radius:8px; cursor:pointer; font-weight:600; font-size:14px; color:var(--muted); transition:all 0.2s; border:none; background:none; font-family:'Poppins',sans-serif; }
.auth-tab.active { background:var(--accent); color:#000; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:11px; font-weight:600; color:var(--muted2); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
.form-group input {
  width:100%; background:var(--s1); border:1px solid var(--border);
  color:var(--text); padding:12px 16px; border-radius:10px;
  font-family:'Poppins',sans-serif; font-size:14px; transition:all 0.2s;
}
.form-group input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,212,170,0.08); }
.form-group input::placeholder { color:var(--muted); }
.btn-primary {
  width:100%; background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000; padding:14px; border-radius:12px; font-size:15px; font-weight:700;
  cursor:pointer; border:none; transition:all 0.2s; font-family:'Rajdhani',sans-serif;
  letter-spacing:1px; margin-top:4px;
}
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,212,170,0.3); }
.btn-primary:active { transform:translateY(0); }
.auth-bonus { background:rgba(245,200,66,0.08); border:1px solid rgba(245,200,66,0.2); border-radius:10px; padding:12px 16px; text-align:center; margin-top:16px; font-size:13px; color:var(--gold); }

/* ════════════════════════ TOP NAV ════════════════════════ */
.topnav {
  background:rgba(6,11,18,0.95); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border); padding:12px 16px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
.nav-logo { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; letter-spacing:1px; }
.nav-logo span { color:var(--accent); }
.nav-right { display:flex; align-items:center; gap:12px; }
.wallet-chip {
  background:var(--s2); border:1px solid var(--border); border-radius:20px;
  padding:6px 14px; display:flex; align-items:center; gap:6px;
  font-size:13px; font-weight:600; cursor:pointer;
}
.wallet-chip .amount { color:var(--gold); font-family:'JetBrains Mono',monospace; }
.avatar-btn {
  width:36px; height:36px; border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:12px; color:#000; cursor:pointer; border:none;
}

/* ════════════════════════ BOTTOM NAV ════════════════════════ */
.bottomnav {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:rgba(6,11,18,0.97); backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  display:flex; padding:8px 0 max(8px,env(safe-area-inset-bottom));
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:4px; cursor:pointer; border:none; background:none;
  color:var(--muted); transition:all 0.2s;
}
.nav-item.active { color:var(--accent); }
.nav-item .nav-icon { font-size:22px; }
.nav-item .nav-label { font-size:10px; font-weight:600; letter-spacing:0.5px; }
.page-content { padding-bottom:80px; }

/* ════════════════════════ HOME / MATCHES ════════════════════════ */
.home-hero {
  background:linear-gradient(135deg, #0a1f35 0%, #0d2840 100%);
  padding:20px 16px; border-bottom:1px solid var(--border);
}
.hero-banner {
  background:linear-gradient(135deg, rgba(0,212,170,0.15), rgba(245,200,66,0.1));
  border:1px solid rgba(0,212,170,0.2); border-radius:16px;
  padding:16px 20px; display:flex; justify-content:space-between; align-items:center;
}
.hero-banner h2 { font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700; }
.hero-banner p { font-size:12px; color:var(--muted2); margin-top:2px; }
.hero-prize { text-align:right; }
.hero-prize .amount { font-family:'Rajdhani',sans-serif; font-size:28px; font-weight:700; color:var(--gold); }
.hero-prize .label { font-size:11px; color:var(--muted2); }

.section-header { display:flex; justify-content:space-between; align-items:center; padding:16px 16px 8px; }
.section-title { font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700; letter-spacing:0.5px; }
.section-link { font-size:12px; color:var(--accent); font-weight:600; cursor:pointer; }

/* Match Card */
.match-card {
  margin:8px 16px; background:var(--card); border:1px solid var(--border);
  border-radius:16px; overflow:hidden; cursor:pointer; transition:all 0.2s;
}
.match-card:hover { border-color:var(--accent); transform:translateY(-2px); }
.match-card-header {
  background:linear-gradient(135deg, var(--s2), var(--s3));
  padding:10px 16px; display:flex; justify-content:space-between; align-items:center;
  border-bottom:1px solid var(--border);
}
.match-badge { font-size:11px; font-weight:700; color:var(--accent); background:rgba(0,212,170,0.1); padding:3px 8px; border-radius:6px; letter-spacing:1px; }
.match-time { font-size:11px; color:var(--muted2); font-family:'JetBrains Mono',monospace; }
.match-teams { padding:16px; display:flex; align-items:center; justify-content:space-between; }
.team-info { text-align:center; flex:1; }
.team-flag { font-size:32px; display:block; margin-bottom:4px; }
.team-name { font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:700; }
.vs-badge {
  background:var(--s1); border:2px solid var(--border); border-radius:50%;
  width:40px; height:40px; display:flex; align-items:center; justify-content:center;
  font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:700; color:var(--muted2);
}
.match-card-footer {
  padding:10px 16px; border-top:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;
}
.contest-info { display:flex; gap:16px; }
.info-chip { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--muted2); }
.info-chip span { color:var(--accent); font-weight:600; }
.join-btn {
  background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#000;
  padding:8px 20px; border-radius:20px; font-size:13px; font-weight:700;
  border:none; cursor:pointer; font-family:'Rajdhani',sans-serif; letter-spacing:0.5px;
}

/* Countdown */
.countdown { display:flex; gap:8px; justify-content:center; margin-top:8px; }
.count-unit { text-align:center; }
.count-num { font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700; color:var(--gold); background:var(--s1); border-radius:6px; padding:4px 8px; display:block; }
.count-label { font-size:9px; color:var(--muted); margin-top:2px; letter-spacing:1px; text-transform:uppercase; }

/* ════════════════════════ CONTEST LIST ════════════════════════ */
.match-detail-header {
  background:linear-gradient(135deg, #0a1f35, #0d2840);
  padding:16px; border-bottom:1px solid var(--border);
}
.back-btn { display:flex; align-items:center; gap:8px; color:var(--muted2); font-size:13px; cursor:pointer; margin-bottom:12px; border:none; background:none; font-family:'Poppins',sans-serif; }
.match-detail-teams { display:flex; align-items:center; justify-content:space-between; padding:0 8px; }
.detail-team { text-align:center; }
.detail-team .flag { font-size:28px; }
.detail-team .name { font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700; }
.vs-text { font-family:'Rajdhani',sans-serif; font-size:16px; color:var(--muted); }

.contest-tabs { display:flex; background:var(--s1); padding:4px; margin:12px 16px; border-radius:12px; }
.contest-tab { flex:1; padding:8px 4px; text-align:center; border-radius:8px; cursor:pointer; font-size:12px; font-weight:600; color:var(--muted); border:none; background:none; font-family:'Poppins',sans-serif; transition:all 0.2s; }
.contest-tab.active { background:var(--accent); color:#000; }

.contest-card {
  margin:8px 16px; background:var(--card); border:1px solid var(--border);
  border-radius:16px; overflow:hidden;
}
.contest-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start; }
.contest-name { font-family:'Rajdhani',sans-serif; font-size:17px; font-weight:700; }
.contest-prize { text-align:right; }
.prize-pool { font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700; color:var(--gold); }
.prize-label { font-size:10px; color:var(--muted2); }
.contest-body { padding:12px 16px; }
.progress-bar-wrap { background:var(--s1); border-radius:4px; height:6px; margin:8px 0; overflow:hidden; }
.progress-bar { height:100%; border-radius:4px; background:linear-gradient(90deg,var(--accent),var(--gold)); transition:width 0.5s; }
.contest-stats { display:flex; justify-content:space-between; font-size:11px; color:var(--muted2); }
.contest-footer { padding:12px 16px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.entry-fee { font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700; color:var(--accent); }
.entry-label { font-size:10px; color:var(--muted); }
.join-contest-btn {
  background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#000;
  padding:10px 24px; border-radius:20px; font-size:14px; font-weight:700;
  border:none; cursor:pointer; font-family:'Rajdhani',sans-serif;
}
.top-prize-chip { background:rgba(245,200,66,0.1); border:1px solid rgba(245,200,66,0.2); padding:3px 10px; border-radius:6px; font-size:11px; color:var(--gold); }

/* ════════════════════════ TEAM BUILDER ════════════════════════ */
.builder-header {
  background:var(--s1); padding:12px 16px; border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:50;
}
.credits-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.credits-left { font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700; color:var(--gold); }
.player-count { font-size:13px; color:var(--muted2); }
.role-counts { display:flex; gap:8px; justify-content:space-between; }
.role-pill {
  flex:1; text-align:center; padding:6px 4px; border-radius:8px; font-size:11px; font-weight:600;
  border:1px solid;
}
.role-pill.WK { color:var(--wk-color); border-color:rgba(249,115,22,0.3); background:rgba(249,115,22,0.08); }
.role-pill.BAT { color:var(--bat-color); border-color:rgba(34,197,94,0.3); background:rgba(34,197,94,0.08); }
.role-pill.AR { color:var(--ar-color); border-color:rgba(168,85,247,0.3); background:rgba(168,85,247,0.08); }
.role-pill.BWL { color:var(--bwl-color); border-color:rgba(59,130,246,0.3); background:rgba(59,130,246,0.08); }
.role-pill .count { font-size:16px; display:block; font-family:'JetBrains Mono',monospace; }

.player-filter-tabs { display:flex; overflow-x:auto; gap:6px; padding:10px 16px; scrollbar-width:none; }
.player-filter-tabs::-webkit-scrollbar { display:none; }
.filter-tab {
  white-space:nowrap; padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600;
  cursor:pointer; border:1px solid var(--border); background:none; color:var(--muted2);
  transition:all 0.2s; font-family:'Poppins',sans-serif;
}
.filter-tab.active { background:var(--accent); color:#000; border-color:var(--accent); }

.player-item {
  display:flex; align-items:center; gap:12px; padding:12px 16px;
  border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.15s;
  position:relative;
}
.player-item:hover { background:var(--s2); }
.player-item.selected { background:rgba(0,212,170,0.05); border-left:3px solid var(--accent); }
.player-item.disabled { opacity:0.4; cursor:not-allowed; }
.player-avatar-sm {
  width:44px; height:44px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:12px; flex-shrink:0;
  position:relative;
}
.player-avatar-sm.WK { background:rgba(249,115,22,0.15); color:var(--wk-color); }
.player-avatar-sm.BAT { background:rgba(34,197,94,0.15); color:var(--bat-color); }
.player-avatar-sm.AR { background:rgba(168,85,247,0.15); color:var(--ar-color); }
.player-avatar-sm.BWL { background:rgba(59,130,246,0.15); color:var(--bwl-color); }
.player-info { flex:1; min-width:0; }
.player-name { font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.player-team { font-size:11px; color:var(--muted2); }
.player-meta { text-align:right; }
.player-credits { font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600; color:var(--text); }
.player-sel { font-size:11px; color:var(--muted2); }
.select-btn {
  width:28px; height:28px; border-radius:50%; border:2px solid var(--border);
  background:none; display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0; transition:all 0.2s;
}
.select-btn.selected { background:var(--accent); border-color:var(--accent); color:#000; }
.role-tag {
  position:absolute; top:4px; right:4px;
  font-size:8px; font-weight:700; padding:1px 5px; border-radius:4px; letter-spacing:0.5px;
}
.role-tag.WK { background:rgba(249,115,22,0.2); color:var(--wk-color); }
.role-tag.BAT { background:rgba(34,197,94,0.2); color:var(--bat-color); }
.role-tag.AR { background:rgba(168,85,247,0.2); color:var(--ar-color); }
.role-tag.BWL { background:rgba(59,130,246,0.2); color:var(--bwl-color); }

.builder-footer {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:rgba(6,11,18,0.97); border-top:1px solid var(--border);
  padding:12px 16px;
}
.preview-players { display:flex; gap:6px; overflow-x:auto; margin-bottom:12px; scrollbar-width:none; }
.preview-player {
  flex-shrink:0; width:48px; text-align:center; cursor:pointer;
}
.preview-avatar {
  width:40px; height:40px; border-radius:50%; display:flex;
  align-items:center; justify-content:center; font-size:10px; font-weight:700;
  margin:0 auto 3px; border:2px solid transparent;
}
.preview-avatar.captain { border-color:var(--gold); }
.preview-avatar.vc { border-color:var(--purple); }
.preview-name { font-size:9px; color:var(--muted2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.continue-btn {
  width:100%; background:linear-gradient(135deg,var(--accent),var(--gold));
  color:#000; padding:14px; border-radius:12px; font-size:16px; font-weight:700;
  border:none; cursor:pointer; font-family:'Rajdhani',sans-serif; letter-spacing:1px;
  opacity:0.4; transition:all 0.2s;
}
.continue-btn.ready { opacity:1; }

/* ════════════════════════ CAP/VC SCREEN ════════════════════════ */
.capvc-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:12px 16px 100px; }
.capvc-card {
  background:var(--card); border:2px solid var(--border); border-radius:14px;
  padding:14px; text-align:center; cursor:pointer; transition:all 0.2s; position:relative;
}
.capvc-card:hover { border-color:var(--accent); }
.capvc-card.captain { border-color:var(--gold); background:rgba(245,200,66,0.05); }
.capvc-card.vc { border-color:var(--purple); background:rgba(168,85,247,0.05); }
.capvc-avatar {
  width:52px; height:52px; border-radius:14px; margin:0 auto 8px;
  display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px;
}
.capvc-name { font-weight:600; font-size:13px; margin-bottom:2px; }
.capvc-role { font-size:11px; color:var(--muted2); }
.cap-badge, .vc-badge {
  position:absolute; top:-6px; right:-6px; width:24px; height:24px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700;
}
.cap-badge { background:var(--gold); color:#000; }
.vc-badge { background:var(--purple); color:#fff; }
.multiplier { font-size:10px; color:var(--muted2); margin-top:4px; }

/* ════════════════════════ MY TEAMS ════════════════════════ */
.my-team-card {
  margin:8px 16px; background:var(--card); border:1px solid var(--border);
  border-radius:16px; overflow:hidden;
}
.team-card-header { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.team-card-name { font-family:'Rajdhani',sans-serif; font-size:17px; font-weight:700; }
.team-points { font-family:'JetBrains Mono',monospace; font-size:20px; color:var(--gold); font-weight:700; }
.team-preview-row { padding:12px 16px; display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; }
.team-mini-player {
  flex-shrink:0; text-align:center;
}
.mini-avatar {
  width:36px; height:36px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-size:10px; font-weight:700; margin:0 auto 2px;
}
.mini-name { font-size:9px; color:var(--muted2); white-space:nowrap; }
.team-card-footer { padding:10px 16px; border-top:1px solid var(--border); display:flex; justify-content:space-between; }
.team-cap-info { font-size:12px; color:var(--muted2); }
.team-cap-info strong { color:var(--gold); }

/* ════════════════════════ CON
